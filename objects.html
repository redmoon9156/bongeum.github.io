<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects | Bongeum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; height: auto; display: block; border-radius: 0; }

        /* 헤더 및 햄버거 (about.html과 완전 동일!) */
        header {
            position: fixed;
            top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 2000;
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* 네비게이션 오버레이 (about.html과 동일) */
        .nav-overlay {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 120px;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* 모바일: 50dvh 오버레이 + 더 아래 시작! */
        @media (max-width: 1023px) {
            .nav-overlay {
                height: 50dvh;
                top: -50dvh;
                padding-top: 90px;
            }
            .nav-overlay.active { top: 0; }
            .nav-list { text-align: center; }
            .nav-list li { margin: 25px 0; }

            /* 모바일에서 좌측카테고리 숨기기 */
            .sidebar { display: none !important; }
        }
        /* PC: 기존 오버레이 슬라이딩 */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh; transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee; justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px;
            }
            .nav-overlay.active { left: calc(100% - 450px);}
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0;}
            .nav-list li a { font-size: 1rem;}
            .sidebar { display: flex;}
        }

        /* 본문(PC/모바일 공통) */
        main { padding: 140px 20px 60px; display: flex; flex-direction: column; align-items: center; }
        .container {
            max-width: 1400px; width: 100%; margin: 0 auto;
            display: flex; gap: 64px; align-items: flex-start;
        }
        /* PC 전용: 좌측 select by category */
        .sidebar {
            min-width: 220px;
            padding-top: 20px;
            padding-bottom: 54px;
            border-right: 1px solid #e2e2e2;
            display: flex; flex-direction: column; justify-content: flex-start;
        }
        .category-title {
            font-size: 0.83rem;
            letter-spacing: 0.22em;
            color: #888;
            margin-bottom: 38px;
            text-transform: lowercase;
        }
        .category-list {
            display: flex; flex-direction: column; gap: 18px;
        }
        .category-link {
            display: block;
            color: #151515;
            text-decoration: underline;
            font-size: 1.18rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.04em;
            padding-bottom: 2px;
            transition: color 0.16s;
            cursor: pointer;
        }
        .category-link:hover { color: #232323; }

        /* MAIN PRODUCT 목록 */
        .products-sections {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 64px;
        }
        .product-section {}
        .product-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .product-title {
            font-size: 1.5rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .section-more {
            width: 34px; height: 34px;
            background: #fff; border-radius: 50%; border: none; color: #bbb;
            font-size: 28px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: none; margin-left: 12px; cursor: pointer; transition: color .14s;
        }
        .section-more:hover { color: #232323; }
        .product-images-row {
            display: flex; gap: 23px;
        }
        .product-img-box {
            width: 212px; height: 272px;
            border-radius: 13px;
            overflow: hidden;
            background: #f7f7f7;
            display: flex; align-items: center; justify-content: center;
        }
        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width:1200px) {
            .container { padding: 0 10px; }
            .products-sections { gap: 36px;}
            .container { flex-direction: column; gap: 0; }
        }
        @media (max-width:700px) {
            .product-images-row { flex-direction: column; gap: 11px; }
            .product-img-box { width: 95vw; max-width:380px; height: auto; aspect-ratio: 1/1.28; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>
    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>
    <main>
        <div class="container">
            <!-- PC ONLY: 카테고리 메뉴 -->
            <aside class="sidebar">
                <div class="category-title">select by category</div>
                <nav class="category-list">
                    <a class="category-link" href="kettle.html">Kettle</a>
                    <a class="category-link" href="vase.html">Vase</a>
                </nav>
            </aside>
            <!-- Products Content -->
            <section class="products-sections" id="productsSections"></section>
        </div>
    </main>
    <script>
        // 각 카테고리별 최대 3개만 preview용으로 노출
        const PRODUCTS = [
            {
                name: "Kettle",
                page: "kettle.html",
                images: [
                    "objects_images_kettle_1.jpeg",
                    "objects_images_kettle_2.jpeg",
                    "objects_images_kettle_3.jpeg"
                ]
            },
            {
                name: "Vase",
                page: "vase.html",
                images: [
                    "object_images_vase_1.jpeg"
                ]
            }
        ];

        function renderProductSections() {
            const container = document.getElementById('productsSections');
            container.innerHTML = '';
            PRODUCTS.forEach(item => {
                // section
                const section = document.createElement('div');
                section.className = 'product-section';

                // header
                const headerRow = document.createElement('div');
                headerRow.className = 'product-header-row';
                // Title
                const title = document.createElement('span');
                title.className = 'product-title';
                title.textContent = item.name;

                // ... 버튼
                const moreBtn = document.createElement('button');
                moreBtn.className = 'section-more';
                moreBtn.type = 'button';
                moreBtn.title = '더 보기';
                moreBtn.innerHTML = "…";
                moreBtn.onclick = () => { window.location.href = item.page; };

                headerRow.appendChild(title);
                headerRow.appendChild(moreBtn);

                // 이미지 row (최대 3개)
                const imgRow = document.createElement('div');
                imgRow.className = 'product-images-row';
                item.images.slice(0, 3).forEach(src => {
                    const imgBox = document.createElement('div');
                    imgBox.className = 'product-img-box';
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = item.name + " 이미지";
                    imgBox.appendChild(img);
                    imgRow.appendChild(imgBox);
                });

                section.appendChild(headerRow);
                section.appendChild(imgRow);
                container.appendChild(section);
            });
        }
        renderProductSections();

        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            }
            else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>
</body>
</html>
