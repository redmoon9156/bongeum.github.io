<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects | Bongeum</title>
    <style>
        html { font-size: 16px; }
        body {
            background: #fff;
            color: #232323;
            font-family: 'Times New Roman', serif;
            font-weight: 300;
            letter-spacing: .02em;
        }
        a { color: inherit; text-decoration: underline; }
        ul { list-style: none; padding: 0; margin: 0; }
        img { display: block; width: 100%; height: auto; object-fit: cover; }

        /* Header - index와 동일 */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 30px 20px;
            background: #fff;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            border-bottom: 1px solid #eee;
        }
        .logo {
            font-size: 1rem;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .menu-trigger {
            cursor: pointer;
            width: 24px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-trigger span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: #000;
            transition: 0.3s;
        }

        /* 햄버거 오버레이 */
        .nav-overlay {
            position: fixed;
            top: -100%; left: 0; width: 100%; height: 100vh;
            background: #fff; z-index: 1500;
            display: flex; justify-content: center; align-items: flex-start; padding-top: 120px;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0;}
        .nav-list li a {
            font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300;
        }
        @media (max-width: 1023px) {
            .nav-overlay {
                height: 50dvh;
                top: -50dvh;
                padding-top: 90px;
            }
            .nav-overlay.active { top: 0; }
        }
        @media (min-width: 1024px) {
            header { padding: 60px 80px;}
            .logo { font-size: 1.3rem; }
            .nav-overlay {
                top: 0; left: 100%;
                width: 450px; height: 100vh;
                border-left: 1px solid #eee; padding: 180px 0 0 80px;
                justify-content: flex-start; align-items: flex-start;
            }
            .nav-overlay.active { left: calc(100% - 450px);}
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0;}
            .nav-list li a { font-size: 1rem;}
        }

        /* 메인 레이아웃 */
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 40px;
            padding-top: 110px; /* 헤더 공간 확보 */
        }
        .main-layout {
            display: flex;
            gap: 64px;
            align-items: flex-start;
            width: 100%;
        }

        /* PC 전용 사이드 카테고리 메뉴 */
        .sidebar {
            min-width: 220px;
            padding-top: 20px;
            padding-bottom: 54px;
            border-right: 1px solid #e2e2e2;
            display: flex; flex-direction: column; justify-content: flex-start;
        }
        .category-title {
            font-size: 0.83rem;
            letter-spacing: 0.22em;
            color: #888;
            margin-bottom: 38px;
            text-transform: lowercase;
        }
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .category-link {
            display: block;
            color: #151515;
            text-decoration: underline;
            font-size: 1.18rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.04em; padding-bottom: 2px;
            transition: color 0.16s;
            cursor: pointer;
        }
        .category-link:hover { color: #232323; }
        @media (max-width: 1023px) {
            .sidebar { display: none !important; }
        }

        /* PRODUCTS CONTENT */
        .products-sections {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 64px;
        }
        .product-section {}
        .product-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .product-title {
            font-size: 1.5rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .section-more {
            width: 34px; height: 34px;
            background: #fff; border-radius: 50%; border: none; color: #bbb;
            font-size: 28px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: none; margin-left: 12px; cursor: pointer; transition: color .14s;
        }
        .section-more:hover { color: #232323; }
        .product-images-row {
            display: flex; gap: 23px;
        }
        .product-img-box {
            width: 212px; height: 272px;
            border-radius: 13px;
            overflow: hidden;
            background: #f7f7f7;
            display: flex; align-items: center; justify-content: center;
        }
        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width:1200px) {
            .container { padding: 0 10px; }
            .main-layout { flex-direction: column; gap: 0; }
            .products-sections { gap: 36px;}
        }
        @media (max-width:700px) {
            .product-images-row { flex-direction: column; gap: 11px; }
            .product-img-box { width: 95vw; max-width:380px; height: auto; aspect-ratio: 1/1.28; }
        }
    </style>
</head>
<body>
    <!-- 헤더 영역(좌 Bongeum, 우 햄버거) -->
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="main-layout">
            <!-- PC ONLY: 카테고리 메뉴 -->
            <aside class="sidebar">
                <div class="category-title">select by category</div>
                <nav class="category-list">
                    <a class="category-link" href="kettle.html">Kettle</a>
                    <a class="category-link" href="vase.html">Vase</a>
                </nav>
            </aside>
            <!-- Products Content -->
            <section class="products-sections" id="productsSections">
                <!-- javascript에서 자동 생성 -->
            </section>
        </div>
    </div>
    <script>
        // (실제 이미지로 쓰실 땐 images/objects/...로 교체)
        const PRODUCTS = [
            {
                name: "Kettle",
                page: "kettle.html",
                images: [
                    "https://picsum.photos/400/520?random=101",
                    "https://picsum.photos/400/520?random=102",
                    "https://picsum.photos/400/520?random=103"
                ]
            },
            {
                name: "Vase",
                page: "vase.html",
                images: [
                    "https://picsum.photos/400/520?random=201",
                    "https://picsum.photos/400/520?random=202",
                    "https://picsum.photos/400/520?random=203"
                ]
            }
            // 카테고리/이미지 추가시 위 패턴대로 계속 추가
        ];

        // 본문(product section) 자동 생성
        function renderProductSections() {
            const container = document.getElementById('productsSections');
            container.innerHTML = '';
            PRODUCTS.forEach(item => {
                // section div
                const section = document.createElement('div');
                section.className = 'product-section';

                // header
                const headerRow = document.createElement('div');
                headerRow.className = 'product-header-row';
                // Title
                const title = document.createElement('span');
                title.className = 'product-title';
                title.textContent = item.name;
                // ... 버튼
                const moreBtn = document.createElement('button');
                moreBtn.className = 'section-more';
                moreBtn.type = 'button';
                moreBtn.title = '더 보기';
                moreBtn.innerHTML = "…";
                moreBtn.onclick = () => { window.location.href = item.page; };
                headerRow.appendChild(title);
                headerRow.appendChild(moreBtn);

                // 이미지 row
                const imgRow = document.createElement('div');
                imgRow.className = 'product-images-row';
                item.images.forEach(src => {
                    const imgBox = document.createElement('div');
                    imgBox.className = 'product-img-box';
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = item.name + " 이미지";
                    imgBox.appendChild(img);
                    imgRow.appendChild(imgBox);
                });

                // 조립
                section.appendChild(headerRow);
                section.appendChild(imgRow);
                container.appendChild(section);
            });
        }
        renderProductSections();

        // 햄버거 네비 오버레이
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>
</body>
</html>
