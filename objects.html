<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBJECTS | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* [2. 헤더 - 하얀색 불투명 고정] ----------------------- */
        header {
            position: fixed;
            top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; background-color: #ffffff; 
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이] ---------------------------- */
        .nav-overlay {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100vh;
            background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77,0,0.175,1);
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 120px; box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 타이틀 스타일] ---------------------------------- */
        .page-title {
            width: 100%; text-align: center; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        /* [5. 슬라이더 핵심 스타일] --------------------------- */
        .category-section, .category-group {
            width: 100%; margin-bottom: 80px; text-align: center;
        }
        .category-name, .category-group-name { 
            display: inline-block; font-weight: 600; letter-spacing: 0.15em; 
            text-transform: uppercase; margin-bottom: 30px; text-decoration: underline;
        }

        /* 슬라이더 컨테이너 (정방형) */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* PC에서도 너무 커지지 않게 제한 */
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background: #f7f7f7;
            overflow: hidden;
            cursor: pointer;
        }
        .slider-wrapper {
            display: flex;
            width: 100%; height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slider-wrapper img {
            width: 100%; height: 100%; object-fit: cover; flex-shrink: 0;
        }

        /* 인디케이터 (현재 몇 번째 이미지인지 표시) */
        .dots {
            display: flex; justify-content: center; gap: 8px; margin-top: 15px;
        }
        .dot {
            width: 6px; height: 6px; background: #ddd; border-radius: 50%; transition: 0.3s;
        }
        .dot.active { background: #000; }

        /* [6. 모바일 레이아웃 (1023px 이하)] ------------------ */
        @media (max-width: 1023px) {
            .nav-overlay { height: 50dvh; top: -50dvh; padding-top: 90px; }
            main { padding: 140px 20px 60px; flex: 1; }
            .page-title { font-size: 1.2rem; margin-bottom: 40px; }
            .category-name { font-size: 1rem; }
            .pc-only { display: none !important; }
        }

        /* [7. PC 레이아웃 (1024px 이상)] --------------------- */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                border-left: 1px solid #eee; transition: left 0.5s cubic-bezier(0.77,0,0.175,1);
                justify-content: flex-start; align-items: flex-start;
                padding: 180px 0 0 80px; box-shadow: none;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            main { padding: 220px 80px 100px; flex: 1; display: flex; flex-direction: column; align-items: center; }
            .page-title { font-size: 2.0rem; margin-bottom: 80px; }
            .container { max-width: 1400px; width: 100%; display: flex; gap: 80px; }
            .sidebar { 
                min-width: 220px; border-right: 1px solid #eee; 
                display: flex; flex-direction: column; gap: 40px; text-align: left;
            }
            .side-title { font-size: 0.8rem; color: #888; letter-spacing: 0.2em; text-transform: lowercase; }
            .side-nav a { 
                display: block; font-size: 1.2rem; font-weight: 600; 
                letter-spacing: 0.15em; text-transform: uppercase; 
                margin-bottom: 20px; text-decoration: underline;
            }
            .content-area { flex: 1; display: flex; flex-direction: column; gap: 100px; }
            .category-group-name { font-size: 1.3rem; }
            .mobile-only { display: none !important; }
        }

        /* [8. 푸터] ----------------------------------------- */
        footer {
            width: 100%; padding: 30px 20px; text-align: center;
            font-size: 10px; letter-spacing: 0.15em; color: #000;
            margin-top: auto; border-top: 1px solid #f0f0f0; background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title">OBJECTS</h1>

        <div class="mobile-only" id="mobileContent" style="width: 100%;"></div>

        <div class="pc-only container">
            <aside class="sidebar">
                <div class="side-title">select by category</div>
                <nav class="side-nav">
                    <a href="kettle.html">Kettle</a>
                    <a href="vase.html">Vase</a>
                </nav>
            </aside>
            <section class="content-area" id="pcContent"></section>
        </div>
    </main>

    <footer>© BONGEUM. All rights reserved.</footer>

    <script>
    // [데이터 관리] 이미지 추가 시 이 배열만 수정하면 됩니다.
    const PRODUCTS = [
        {
            id: "kettle",
            name: "Kettle",
            page: "kettle.html",
            images: [
                "images/objects/kettle/objects_images_kettle_1.jpeg",
                "images/objects/kettle/objects_images_kettle_2.jpeg",
                "images/objects/kettle/objects_images_kettle_3.jpeg"
            ]
        },
        {
            id: "vase",
            name: "Vase",
            page: "vase.html",
            images: [
                "images/objects/vase/object_images_vase_1.jpeg"
            ]
        }
    ];

    function createSlider(item, isPC) {
        const section = document.createElement('div');
        section.className = isPC ? 'category-group' : 'category-section';

        // 1. 카테고리 이름 (클릭 시 이동)
        const nameLink = document.createElement('a');
        nameLink.href = item.page;
        nameLink.className = isPC ? 'category-group-name' : 'category-name';
        nameLink.textContent = item.name;
        section.appendChild(nameLink);

        // 2. 슬라이더 영역
        const sliderContainer = document.createElement('div');
        sliderContainer.className = 'slider-container';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'slider-wrapper';
        
        item.images.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            wrapper.appendChild(img);
        });

        sliderContainer.appendChild(wrapper);

        // 3. 인디케이터 (점)
        const dotsContainer = document.createElement('div');
        dotsContainer.className = 'dots';
        item.images.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 0 ? 'active' : ''}`;
            dotsContainer.appendChild(dot);
        });
        
        if(item.images.length > 1) section.appendChild(dotsContainer);
        section.insertBefore(sliderContainer, dotsContainer);

        // [클릭 이벤트 로직] 1/4 지점 판단
        let currentIndex = 0;
        sliderContainer.addEventListener('click', (e) => {
            const rect = sliderContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;

            if (clickX < width * 0.25) { // 좌측 1/4 클릭 (이전)
                currentIndex = (currentIndex - 1 + item.images.length) % item.images.length;
            } else if (clickX > width * 0.75) { // 우측 1/4 클릭 (다음)
                currentIndex = (currentIndex + 1) % item.images.length;
            } else { // 중앙 클릭 시 페이지 이동
                window.location.href = item.page;
                return;
            }

            // 이동 애니메이션 및 점 업데이트
            wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
        });

        return section;
    }

    function renderObjects() {
        const mobileContainer = document.getElementById('mobileContent');
        const pcContainer = document.getElementById('pcContent');

        PRODUCTS.forEach(item => {
            mobileContainer.appendChild(createSlider(item, false));
            pcContainer.appendChild(createSlider(item, true));
        });
    }

    renderObjects();

    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');
        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        } else {
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
        }
    }
    </script>
</body>
</html>
