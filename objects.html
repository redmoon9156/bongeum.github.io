<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects | Bongeum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fff;
            color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }
        ul { list-style: none; }
        img { display: block; max-width: 100%; height: auto; }

        header {
            width: 100%;
            padding: 30px 20px 0 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .dummy-space { height: 70px; } /* 헤더 공간 확보 */

        .container {
            display: flex;
            flex-direction: column;
            max-width: 1160px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .breadcrumb {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .main-content {
            display: flex;
            flex-direction: row;
            gap: 40px;
        }
        /* LEFT CATEGORY / PC ONLY */
        .sidebar {
            width: 210px;
            min-width: 170px;
        }
        .category-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 20px;
        }
        .category-list { display: flex; flex-direction: column; gap: 14px; }
        .category-link {
            padding: 4px 0; cursor: pointer; color: #555;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .category-link.active, .category-link:hover {
            color: #000;
            font-weight: bold;
        }
        /* MAIN PRODUCT LIST */
        .object-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .object-pane-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .object-category-name {
            font-size: 1.15rem;
            font-weight: 600;
            text-transform: capitalize;
            letter-spacing: 0.03em;
        }
        .object-more {
            background: none;
            border: none;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            color: #adadad;
            padding: 0 4px 0 10px;
            transition: color 0.15s;
        }
        .object-more:hover { color: #000; }
        /* 이미지를 가로로 나란히 */
        .object-images {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .object-img-wrap {
            width: 210px;
            aspect-ratio: 1 / 1.15;
            background: #f8f8f8;
            border-radius: 12px;
            box-shadow: 0 3px 10px 0 rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 모바일 레이아웃 */
        @media (max-width: 1023px) {
            header { padding: 20px 14px 0 14px; }
            .logo { font-size: 1.1rem; }
            .container { padding: 0 8px; }
            .main-content { flex-direction: column; gap: 0; }
            .sidebar { display: none; }
            .object-pane-top { margin-bottom: 16px; }
            .object-category-name { font-size: 1.08rem; }
            .object-images { gap: 15px; justify-content: center; }
            .object-img-wrap { width: 41vw; min-width: 135px; aspect-ratio: 1 / 1.15; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <!-- 나중에 메뉴트리거 필요시 여기에 추가 -->
    </header>
    <div class="dummy-space"></div>
    <div class="container">
        <div class="page-title">Objects</div>
        <nav class="breadcrumb">Objects &gt; Kettle</nav>
        <div class="main-content">

            <!-- PC 좌측 카테고리 SIDEBAR (모바일에서 hidden) -->
            <aside class="sidebar">
                <div class="category-title">Select by Category</div>
                <ul class="category-list">
                    <li><a class="category-link active" href="objects.html">Kettle</a></li>
                    <li><a class="category-link" href="#">Vase</a></li>
                </ul>
            </aside>

            <!-- 우측 Product Image List -->
            <section class="object-pane">
                <div class="object-pane-top">
                    <div class="object-category-name">Kettle</div>
                    <button class="object-more" title="More" onclick="location.href='objects_kettle.html'">…</button>
                </div>
                <div class="object-images">
                    <div class="object-img-wrap">
                        <img src="images/objects/objects_image_kettle_1.jpg" alt="kettle 1">
                    </div>
                    <div class="object-img-wrap">
                        <img src="images/objects/objects_image_kettle_2.jpg" alt="kettle 2">
                    </div>
                    <div class="object-img-wrap">
                        <img src="images/objects/objects_image_kettle_3.jpg" alt="kettle 3">
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
