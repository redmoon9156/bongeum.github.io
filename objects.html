<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects | Bongeum</title>
    <style>
        html { font-size: 16px; }
        body {
            background: #fff;
            color: #232323;
            font-family: 'Times New Roman', serif;
            font-weight: 300;
            letter-spacing: .02em;
        }
        a { color: inherit; text-decoration: underline; }
        ul { list-style: none; padding:0; margin:0; }
        img { display: block; width:100%; height:auto; object-fit: cover; }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 40px;
        }

        header {
            margin-top: 60px;
            margin-bottom: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 1.4rem; font-family: 'Times New Roman', serif; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; }

        .page-title {
            font-size: 2.55rem;
            letter-spacing: 0.13em;
            font-family: 'Times New Roman', serif;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .divider {
            border: 0;
            border-top: 1px solid #e2e2e2;
            margin: 0 0 38px 0;
        }
        .breadcrumb {
            color: #aaa;
            font-size: 1.08rem;
            letter-spacing: 0.08em;
            margin: 0 0 53px 0;
            font-family: 'Times New Roman', serif;
        }
        .main-content {
            display: flex;
            gap: 64px;
            align-items: flex-start;
        }
        /* 카테고리 사이드바 */
        .sidebar {
            min-width: 220px;
            padding-top: 20px;
            padding-bottom: 54px;
            border-right: 1px solid #e2e2e2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .category-title {
            font-size: 0.83rem;
            letter-spacing: 0.22em;
            color: #888;
            margin-bottom: 38px;
            text-transform: lowercase;
        }
        .category-list a {
            display: block;
            color: #151515;
            text-decoration: underline;
            font-size: 1.18rem;
            margin-bottom: 22px;
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.04em;
            padding-bottom: 2px;
            transition: color 0.16s;
        }
        .category-list a.active,
        .category-list a:hover,
        .category-list a:focus {
            color: #232323;
            text-decoration-thickness: 2px;
        }
        /* 상품 그리드 */
        .product-grid-box {
            position: relative;
            width: 100%;
        }
        .section-title-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 35px;
            gap: 0.5em;
        }
        .section-title {
            font-size: 1.75rem;
            font-family: 'Times New Roman', serif;
            font-weight: 400;
            letter-spacing: 0.11em;
            text-transform: capitalize;
        }
        .more-btn {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            border: none;
            color: #bbb;
            font-size: 29px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none;
            margin-left: auto;
            margin-right: -32px;
            position: static;
            cursor: pointer;
            transition: color .14s;
        }
        .more-btn:hover { color: #232323; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }
        .product-card {
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-right: 14px;
        }
        .product-img-box {
            width: 100%;
            aspect-ratio: 1/1.28;
            border-radius: 12px;
            overflow: hidden;
            background: #f7f7f7;
        }
        .product-caption {
            font-size: 1.12rem;
            font-family: 'Times New Roman', serif;
            color: #232323;
            margin: 7px 0 0 0;
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: 0.055em;
        }

        /* 반응형 */
        @media (max-width: 1200px) {
            .main-content { flex-direction: column; gap: 0; }
            .sidebar { min-width: unset; border-right: none; border-bottom: 1px solid #e2e2e2; flex-direction: row; padding-bottom: 16px; margin-bottom: 34px; }
        }
        @media (max-width:900px) {
            .container { padding: 0 10px; }
            .sidebar { gap: 26px; }
            .product-grid { grid-template-columns: 1fr 1fr; }
            .product-card { padding-right: 0;}
        }
        @media (max-width:600px) {
            .page-title { font-size: 1.49rem; }
            .product-grid { grid-template-columns: 1fr; }
            .section-title-row { margin-bottom: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><a href="index.html">Bongeum</a></div>
        </header>
        <div class="page-title">Objects</div>
        <hr class="divider">
        <div class="breadcrumb" id="breadcrumb">Home &gt; Objects</div>
        <div class="main-content">
            <!-- 카테고리 메뉴 (사이드) -->
            <aside class="sidebar">
                <div class="category-title">search by category</div>
                <nav class="category-list">
                    <a href="#" class="active" data-category="Kettle">Kettle</a>
                    <a href="#" data-category="Vase">Vase</a>
                </nav>
            </aside>
            <!-- 오른쪽 상품 그리드 -->
            <div class="product-grid-box">
                <div class="section-title-row">
                    <span class="section-title" id="sectionTitle">Kettle</span>
                    <button class="more-btn" id="moreBtn" title="더 보기">…</button>
                </div>
                <div class="product-grid" id="productGrid">
                    <!-- JS로 상품 카드 생성 -->
                </div>
            </div>
        </div>
    </div>
    <script>
        // 실제 사용시 상품 정보만 바꿔주면 됩니다!
        const PRODUCTS = {
            Kettle: [
                { img: "images/objects/objects_image_kettle_1.jpg", name: "Kettle 1" },
                { img: "images/objects/objects_image_kettle_2.jpg", name: "Kettle 2" },
                { img: "images/objects/objects_image_kettle_3.jpg", name: "Kettle 3" }
            ],
            Vase: [
                { img: "images/objects/objects_image_vase_1.jpg", name: "Vase 1" },
                { img: "images/objects/objects_image_vase_2.jpg", name: "Vase 2" },
                { img: "images/objects/objects_image_vase_3.jpg", name: "Vase 3" }
            ]
        };
        const morePage = {
            Kettle: "objects_kettle.html",
            Vase: "objects_vase.html"
        };
        // 상태
        let curCat = "Kettle";
        function renderCategory(cat){
            curCat = cat;
            // 카테고리 활성화
            document.querySelectorAll('.category-list a').forEach(a=>{
                a.classList.toggle('active', a.getAttribute('data-category')===cat);
            });
            // 타이틀/breadcrumb
            document.getElementById('sectionTitle').textContent = cat;
            document.getElementById('breadcrumb').textContent = `Home > Objects > ${cat}`;
            // grid
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            PRODUCTS[cat].forEach(pr=>{
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img-box"><img src="${pr.img}" alt="${pr.name}"></div>
                    <div class="product-caption">${pr.name}</div>
                `;
                grid.appendChild(card);
            });
            // ...버튼
            const moreBtn = document.getElementById('moreBtn');
            moreBtn.onclick = ()=>{ location.href=morePage[cat]; }
        }
        // 카테고리 전환
        document.querySelectorAll('.category-list a').forEach(a=>{
            a.onclick = function(e){
                e.preventDefault();
                renderCategory(this.dataset.category);
            };
        });
        // 최초
        renderCategory(curCat);
    </script>
</body>
</html>
