<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBJECTS | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* [2. 헤더 - 고정] ----------------------- */
        header {
            position: fixed;
            top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; background-color: #ffffff; 
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이] ---------------------------- */
        .nav-overlay {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100vh;
            background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77,0,0.175,1);
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 120px;
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 타이틀] ---------------------------------- */
        .page-title {
            width: 100%; text-align: center; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        /* [5. 슬라이더 스타일] --------------------------- */
        .category-wrapper { width: 100%; margin-bottom: 100px; text-align: center; }
        .category-name-link { 
            display: inline-block; font-weight: 600; letter-spacing: 0.15em; 
            text-transform: uppercase; margin-bottom: 30px; text-decoration: underline;
            font-size: 1rem;
        }
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background: #f7f7f7;
            overflow: hidden;
            cursor: pointer;
            touch-action: pan-y; /* 수평 스와이프 방해 금지 */
        }
        .slider-wrapper {
            display: flex;
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .slider-wrapper img {
            width: 100%; height: 100%; object-fit: cover; flex-shrink: 0;
            -webkit-user-drag: none; /* 이미지 드래그 방지 */
        }
        .dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; min-height: 10px; }
        .dot { width: 5px; height: 5px; background: #eee; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #000; }

        /* [6. 레이아웃 분리] ------------------ */
        @media (max-width: 1023px) {
            .nav-overlay { height: 50dvh; top: -50dvh; padding-top: 90px; }
            main { padding: 140px 20px 60px; flex: 1; }
            .page-title { font-size: 1.2rem; margin-bottom: 40px; }
            .pc-only { display: none !important; }
        }
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }
            .nav-overlay { top: 0; left: 100%; width: 450px; height: 100vh; border-left: 1px solid #eee; transition: left 0.5s cubic-bezier(0.77,0,0.175,1); justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px; }
            .nav-overlay.active { left: calc(100% - 450px); }
            main { padding: 220px 80px 100px; flex: 1; display: flex; flex-direction: column; align-items: center; }
            .page-title { font-size: 2.0rem; margin-bottom: 80px; }
            .container { max-width: 1400px; width: 100%; display: flex; gap: 80px; }
            .sidebar { min-width: 220px; border-right: 1px solid #eee; display: flex; flex-direction: column; gap: 40px; text-align: left; }
            .side-title { font-size: 0.8rem; color: #888; letter-spacing: 0.2em; text-transform: lowercase; }
            .side-nav a { display: block; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; text-decoration: underline; }
            .content-area { flex: 1; display: flex; flex-direction: column; gap: 100px; }
            .category-name-link { font-size: 1.2rem; }
            .mobile-only { display: none !important; }
        }

        /* [7. 푸터] ----------------------------------------- */
        footer {
            width: 100%; padding: 40px 20px; text-align: center;
            font-size: 10px; letter-spacing: 0.15em; color: #000;
            margin-top: auto; border-top: 1px solid #f0f0f0; background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title">OBJECTS</h1>
        <div class="mobile-only" id="mobileContent" style="width: 100%;"></div>
        <div class="pc-only container">
            <aside class="sidebar">
                <div class="side-title">select by category</div>
                <nav class="side-nav">
                    <a href="kettle.html">Kettle</a>
                    <a href="vase.html">Vase</a>
                </nav>
            </aside>
            <section class="content-area" id="pcContent"></section>
        </div>
    </main>

    <footer>© BONGEUM. All rights reserved.</footer>

    <script>
    const PRODUCTS = [
        {
            name: "Kettle",
            page: "kettle.html",
            images: [
                "images/objects/kettle/objects_images_kettle_1.jpeg",
                "images/objects/kettle/objects_images_kettle_2.jpeg",
                "images/objects/kettle/objects_images_kettle_3.jpeg"
            ]
        },
        {
            name: "Vase",
            page: "vase.html",
            images: ["images/objects/vase/object_images_vase_1.jpeg"]
        }
    ];

    function initSlider(item, containerId) {
        const container = document.getElementById(containerId);
        const section = document.createElement('div');
        section.className = 'category-wrapper';

        const link = document.createElement('a');
        link.href = item.page;
        link.className = 'category-name-link';
        link.textContent = item.name;
        section.appendChild(link);

        const sliderBox = document.createElement('div');
        sliderBox.className = 'slider-container';
        const wrapper = document.createElement('div');
        wrapper.className = 'slider-wrapper';
        item.images.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            wrapper.appendChild(img);
        });
        sliderBox.appendChild(wrapper);
        section.appendChild(sliderBox);

        const dotsBox = document.createElement('div');
        dotsBox.className = 'dots';
        if (item.images.length > 1) {
            item.images.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dotsBox.appendChild(dot);
            });
        }
        section.appendChild(dotsBox);

        let idx = 0;
        let startX = 0;
        let isMoving = false;

        function updateSlider() {
            wrapper.style.transform = `translateX(-${idx * 100}%)`;
            const dots = dotsBox.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        // [1. 클릭 이벤트 - 1/4 지점]
        sliderBox.addEventListener('click', (e) => {
            if (isMoving) return; // 드래그 직후 클릭 방지
            const rect = sliderBox.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const w = rect.width;

            if (x < w * 0.25) {
                idx = (idx - 1 + item.images.length) % item.images.length;
                updateSlider();
            } else if (x > w * 0.75) {
                idx = (idx + 1) % item.images.length;
                updateSlider();
            } else {
                window.location.href = item.page;
            }
        });

        // [2. 터치 스와이프 이벤트]
        sliderBox.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isMoving = false;
        });

        sliderBox.addEventListener('touchmove', (e) => {
            isMoving = true;
        });

        sliderBox.addEventListener('touchend', (e) => {
            if (!isMoving) return;
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;

            if (Math.abs(diff) > 50) { // 50px 이상 움직였을 때만 반응
                if (diff > 0) { // 왼쪽으로 밀기 -> 다음
                    idx = (idx + 1) % item.images.length;
                } else { // 오른쪽으로 밀기 -> 이전
                    idx = (idx - 1 + item.images.length) % item.images.length;
                }
                updateSlider();
            }
        });

        container.appendChild(section);
    }

    function renderAll() {
        PRODUCTS.forEach(p => {
            initSlider(p, 'mobileContent');
            initSlider(p, 'pcContent');
        });
    }
    renderAll();

    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');
        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        } else {
            spans[0].style.transform = 'none'; spans[1].style.opacity = '1'; spans[2].style.transform = 'none';
        }
    }
    </script>
</body>
</html>
