ㅣ<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongeum</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #fff;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* [2. 헤더 - 오버레이보다 항상 위에 있도록 z-index 조정] */
header {
    position: fixed;
    left: 0; top: 0; width: 100%;
    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 4000; /* 오버레이(3000)보다 높게 설정하여 항상 보이게 함 */
    background: transparent;
}
.logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
.menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 4001; }
.menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

/* [3. 햄버거 메뉴 오버레이] */
.nav-overlay {
    position: fixed; top: -100%; left: 0; width: 100%; height: 100vh;
    background-color: #fff; 
    z-index: 3000; /* 헤더보다 낮게 설정 */
    transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    display: flex; justify-content: center; align-items: flex-start; padding-top: 120px;
}
.nav-overlay.active { top: 0; }
.nav-list { text-align: center; }
.nav-list li { margin: 25px 0; }
.nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

/* [4. 슬라이더] */
.slider {
    position: fixed;
    left: 0; top: 0;
    width: 100vw; height: 100dvh;
    overflow: hidden;
    background: #000;
    z-index: 0;
}
.slide-img {
    position: absolute;
    top: 0; left: 0;
    width: 100vw; height: 100dvh; 
    object-fit: cover; 
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
    z-index: 1;
    pointer-events: none;
}
.slide-img.active { opacity: 1; z-index: 2; }

/* [5. 푸터 - 배경 반응형] */
footer {
    position: fixed;
    bottom: 30px;
    left: 0;
    width: 100%;
    background: transparent;
    color: #fff; 
    mix-blend-mode: difference; 
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    z-index: 2000; /* 푸터는 헤더/오버레이보다 아래에 위치 */
    font-weight: 300;
    text-shadow: none; 
    -webkit-font-smoothing: antialiased;
    transform: translateZ(0);
}

/* [6. 반응형 레이아웃] */
@media (max-width: 1023px) {
    .nav-overlay { height: 50dvh; top: -50dvh; padding-top: 90px; }
    .nav-overlay.active { top: 0; }
    .slide-img { object-fit: cover !important; }
}

@media (min-width: 1024px) {
    header { padding: 60px 80px; }
    .logo { font-size: 1.3rem; }
    .nav-overlay {
        top: 0; left: 100%; width: 450px; height: 100vh;
        border-left: 1px solid #eee;
        justify-content: flex-start; align-items: flex-start;
        padding: 180px 0 0 80px;
        transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    }
    .nav-overlay.active { left: calc(100% - 450px);}
    .nav-list { text-align: left;}
}
</style>
</head>
<body>

<div class="slider" id="slider"></div>

<header id="mainHeader">
<div class="logo"><a href="index.html">Bongeum</a></div>
<div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>
</header>

<nav class="nav-overlay" id="navOverlay">
<ul class="nav-list">
<li><a href="about.html" onclick="toggleMenu()">About</a></li>
<li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
<li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
</ul>
</nav>

<footer>
© BONGEUM. All rights reserved.
</footer>

<script>
const sliderImagesPC = [
"images/index/index_images_PC_1.jpeg",
"images/index/index_images_PC_2.jpeg",
"images/index/index_images_PC_3.jpeg"
];
const sliderImagesMobile = [
"images/index/index_images_mobile_1.jpeg",
"images/index/index_images_mobile_2.jpeg",
"images/index/index_images_mobile_3.jpeg"
];

let sliderImages = [];
let currentMode = null;
const breakpoint = 1024;
const slider = document.getElementById('slider');
let currentIdx = 0;
let slides = [];
let timer = null;

function getCurrentMode() {
return window.innerWidth >= breakpoint ? 'pc' : 'mobile';
}

function createSlides() {
slider.innerHTML = '';
slides = [];
sliderImages.forEach((src, idx) => {
const img = document.createElement('img');
img.src = src;
img.alt = '슬라이드 이미지 ' + (idx + 1);
img.className = 'slide-img' + (idx === 0 ? ' active' : '');
slider.appendChild(img);
slides.push(img);
});
}

function showSlide(nextIdx) {
slides.forEach((img, idx) => {
if (idx === currentIdx) {
img.classList.remove('active');
img.style.zIndex = "1";
}
if (idx === nextIdx) {
img.classList.add('active');
img.style.zIndex = "2";
}
});
currentIdx = nextIdx;
}

function nextSlideAuto() {
let nextIdx = (currentIdx+1) % slides.length;
showSlide(nextIdx);
timer = setTimeout(nextSlideAuto, 5000);
}

function startSlider() {
clearTimeout(timer);
createSlides();
currentIdx = 0;
setTimeout(() => {
timer = setTimeout(nextSlideAuto, 5000);
}, 350);
}

function checkModeAndUpdate() {
const mode = getCurrentMode();
if(mode !== currentMode) {
currentMode = mode;
sliderImages = (mode === 'pc') ? sliderImagesPC : sliderImagesMobile;
startSlider();
}
}

window.addEventListener('resize', checkModeAndUpdate);
checkModeAndUpdate();

function toggleMenu() {
const nav = document.getElementById('navOverlay');
const spans = document.querySelectorAll('.menu-trigger span');
const header = document.getElementById('mainHeader');

nav.classList.toggle('active');

if(nav.classList.contains('active')) {
    // 메뉴 열릴 때: 엑스(X) 표시 및 로고가 흰 배경에서도 보이게 z-index 확인
    spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
} else {
    // 메뉴 닫힐 때: 원래대로
    spans[0].style.transform = 'none';
    spans[1].style.opacity = '1';
    spans[2].style.transform = 'none';
}
}
</script>

</body>
</html>
