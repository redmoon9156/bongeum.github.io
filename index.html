<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device, initial-scale=1.0">
    <title>Bongeum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;}
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* PC/모바일 공통 헤더 (contact.html과 동일!) */
        header {
            position: fixed;
            top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 2000;
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* PC 기준 오버레이: contact.html 그대로 */
        .nav-overlay {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
           : top 0.5s cubic-bezier(0.77, 0, 0.175, );
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 120px;
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: px 0; }
        .nav-list li a { font-size: 1.1rem; letter: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* 모바일(1023px 이하): 햄버거를 화면 절반만 + 첫 메뉴 한칸 아래 배치! */
        @media (max-width: 1023px) {
            .-overlay {
                height: 50dvh;
                top: -50dvh;
               -top: 90px; /* ★ 기존보다 더 아래에서 메뉴 시작! (원하시면 ~120px도 가능) */
            }
            .nav-overlay.active { top: 0; }
            .nav-list text-align: center; }
            .nav-list li { margin: 25px 0 }
        }
        /* PC 레이아웃 .nav-overlay는 기존과 동일 (contact.html) */
        @media (min-width: 4px) {
            header { padding: 60px 80px; }
            . { font-size: 1.3rem; }
            .nav-overlay { top: 0; left: 100%;: 450px; height: 100vh; transition: left 0.5s-bezier(0.77, 0, 0.175, 1); border-left: 1px solid #eee; justify-content:-start; align-items: flex-start; padding: 180px 0 0 80;}
            .nav-overlay.active { left: calc(100% - 450px);}
            .nav-list { text-align: left; }
            .nav-list { margin: 35px 0;}
            .nav-list li a { font-size:1rem;}
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Bonge</a></div>
        <div class="menu-trigger" id="menuBtn" onclicktoggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects" onclick="toggleMenu()">Objects</a></li>
            <li><a href=".html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <div class="slider" id="slider">
            <!-- JS에서 이미지가 생성됨 -->
        </div>
    </main>

    <script>
 // 햄버거 메뉴 토글
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAllmenu-trigger span');
            nav.classList.toggle('active');

            if(nav.classList.contains('')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = '';
            }
        }

        // 슬라이더 이미지 목록 (여기만 추가/삭제 됨)
        const sliderImages = [
            "images/index/index_image_1.jpeg",
            "images/index/index_image_2.jpeg",
            "images/index/index_image_3"
        ];

        // 슬라이더 로직
        const slider = document.getElementBy('slider');
        let currentIdx = 0;
        let slides = [];

        function createSlides() {
            slider.innerHTML = '';
            slides = [];
           Images.forEach((src, idx) => {
                const img = document.createElement('img                img.src = src;
                img.alt = '슬라이드 이미지 ' + (idx + 1);
                img.className = 'slide-img' + (idx === 0 ? active' : '');
                slider.appendChild(img);
                slides.push(img);
            });
               createSlides();

        let timer = null;
        function showSlide(nextIdx) {
            slides.forEach((img, idx) => {
                img.classList.remove('active', 'prev', 'next');
                if(idx === currentIdx) img.classList.add('prev');
                if(idx === nextIdx) img.classList.add('active');
            });
            currentIdx = nextIdx;
        }

        function nextSlideAuto() {
            let nextIdx = (currentIdx+1) % slides.length;
            showSlide(nextIdx);
            timer = setTimeout(nextSlideAuto,5000);
        }
        setTimeout(() => {
            timer = setTimeout(nextSlideAuto, 5000);
        }, 350);

        // 리사이즈(이미지 수 바뀌면) 대응 -동기로도
        window.sliderRebuild = function(){
            clearTimeout(timer);
            createSlides();
            currentIdx = 0;
            setTimeout => {
                timer = setTimeout(nextSlideAuto, 5000);
            }, 350        }
    </script>

</body>
</html>
