<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongeum</title>
    <style>
        /* [1. 공통 리셋] ----------------------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* [2. 모바일 버전 (Mobile Specific Design)] ------------- */
        .mobile-only { display: block; }
        .pc-only { display: none; }

        .m-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .m-logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .m-nav ul { display: flex; gap: 12px; }
        .m-nav li a { font-size: 0.7rem; letter-spacing: 0.05em; }

        .m-main {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }
        .m-product-box {
            width: 100%;
            /* 이미지가 불러와지기 전까지 공간 확보를 위한 최소 높이 */
            min-height: 200px;
        }

        /* [3. PC 버전 (PC Specific Design)] -------------------- */
        @media (min-width: 1024px) {
            .mobile-only { display: none; }
            .pc-only { display: block; }

            .pc-header {
                position: fixed;
                top: 0;
                width: 100%;
                padding: 60px 80px;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                z-index: 1000;
            }
            .pc-logo { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; }
            .pc-nav ul { display: flex; gap: 50px; }
            .pc-nav li a { font-size: 0.9rem; transition: 0.3s; }
            .pc-nav li a:hover { opacity: 0.4; }

            .pc-main {
                width: 100%;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .pc-product-box {
                width: 45%; /* PC 화면에서 이미지가 차지할 적정 비율 */
            }
        }
    </style>
</head
