<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* [2. 헤더 및 햄버거 버튼] ----------------------------- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

        .menu-trigger {
            cursor: pointer;
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .menu-trigger span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: #000;
            transition: 0.3s;
        }

        /* [3. 모바일 메뉴 (Top to Bottom & 상단 배치)] ---------- */
        .nav-overlay {
            position: fixed;
            top: -100%; 
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            
            /* 모바일 상단 정렬 설정 */
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 120px; /* 모바일에서 메뉴가 시작될 높이 */
        }
        .nav-overlay.active { top: 0; }

        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 메인 컨텐츠 영역] ------------------------------- */
        main {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }
        .product-box { width: 100%; max-width: 500px; }

        /* [5. PC 환경 독립 설계 (Right to Left & 상단 배치)] ---- */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }

            .nav-overlay {
                top: 0;
                left: 100%; 
                width: 450px; 
                height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee;
                
                /* PC 상단 정렬 및 왼쪽 여백 */
                display: flex;
                justify-content: flex-start;
                align-items: flex-start;
                padding: 180px 0 0 80px; /* PC에서 메뉴가 시작될 높이 (더 위로 올림) */
            }
            .nav-overlay.active { left: calc(100% - 450px); }

            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }

            .product-box { max-width: 45%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
            <li><a href="shop.html" onclick="toggleMenu()">Shop</a></li>
        </ul>
    </nav>

    <main>
        <div class="product-box">
            <img src="images/index/index_image_1.png" alt="index_image_1">
        </div>
    </main>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>

</body>
</html>
