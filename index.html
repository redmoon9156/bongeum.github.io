<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongeum</title>
    <style>
        /* [1. 공통 리셋] ----------------------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* [2. 모바일 버전 (Mobile Specific Design)] ------------- */
        /* 기본적으로 모바일에 최적화된 화면을 먼저 그립니다. */
        .mobile-only { display: block; }
        .pc-only { display: none; }

        .m-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .m-logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .m-nav ul { display: flex; gap: 12px; }
        .m-nav li a { font-size: 0.7rem; letter-spacing: 0.05em; }

        .m-main {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .m-product-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* 모바일은 정중앙 정사각형 배치 */
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.6rem;
            color: #999;
            letter-spacing: 0.1em;
        }

        /* [3. PC 버전 (PC Specific Design)] -------------------- */
        /* 화면 폭이 1024px 이상일 때, 모바일 요소를 숨기고 PC 전용 레이아웃을 활성화합니다. */
        @media (min-width: 1024px) {
            .mobile-only { display: none; }
            .pc-only { display: block; }

            .pc-header {
                position: fixed;
                top: 0;
                width: 100%;
                padding: 60px 80px;
                display: flex;
                flex-direction: column; /* PC에선 로고와 메뉴를 수직으로 배치하거나 더 자유롭게 가능 */
                align-items: flex-start;
                z-index: 1000;
            }

            .pc-logo { 
                font-size: 1.3rem; 
                font-weight: 600; 
                letter-spacing: 0.2em; 
                margin-bottom: 20px;
                text-transform: uppercase;
            }

            .pc-nav {
                position: fixed;
                top: 65px;
                right: 80px;
            }

            .pc-nav ul { display: flex; gap: 50px; }
            .pc-nav li a { font-size: 0.9rem; font-weight: 400; transition: 0.3s; }
            .pc-nav li a:hover { opacity: 0.4; }

            .pc-main {
                width: 100%;
                height: 100vh;
                padding: 0 80px;
                display: flex;
                justify-content: flex-start; /* PC는 왼쪽 정렬로 구조미 강조 */
                align-items: flex-end;
                padding-bottom: 80px;
            }

            .pc-product-box {
                width: 60%; /* PC 전용 와이드 비율 */
                height: 65vh;
                background-color: #f0f0f0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 0.8rem;
                color: #aaa;
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-only">
        <header class="m-header">
            <div class="m-logo"><a href="index.html">Bongeum</a></div>
            <nav class="m-nav">
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="objects.html">Objects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </nav>
        </header>
        <main class="m-main">
            <div class="m-product-box">Mobile Product View</div>
        </main>
    </div>

    <div class="pc-only">
        <header class="pc-header">
            <div class="pc-logo"><a href="index.html">Bongeum</a></div>
        </header>
        <nav class="pc-nav">
            <ul>
                <li><a href="about.html">About</a></li>
                <li><a href="objects.html">Objects</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="shop.html">Shop</a></li>
            </ul>
        </nav>
        <main class="pc-main">
            <div class="pc-product-box">PC Desktop Product View</div>
        </main>
    </div>

</body>
</html>
