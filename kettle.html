<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETTLE | Bongeum</title>
    <style>
        /* [1. 공통 설정] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; display: inline-block; }
        ul { list-style: none; }

        /* [2. 헤더] */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; background-color: #ffffff; 
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; z-index: 2001; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        .nav-overlay {
            position: fixed; left: 0; width: 100%; background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; justify-content: center; align-items: flex-start;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [3. 모바일 레이아웃] */
        @media (max-width: 1023px) {
            .nav-overlay { height: 50dvh; top: -50dvh; padding-top: 90px; }
            .nav-overlay.active { top: 0; }
            .pc-only { display: none !important; }
            main { padding: 140px 20px 60px; flex: 1; }
            
            .page-title { width: 100%; text-align: center; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-size: 1.2rem; cursor: pointer; }
            
            /* [수정] Kettle 글자색을 검정(#000)으로 변경 */
            .sub-title { width: 100%; text-align: center; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 40px; font-size: 0.9rem; color: #000; cursor: pointer; }
            
            .breadcrumb { display: none; }
            .mobile-grid { width: 100%; display: flex; flex-direction: column; gap: 60px; }
            .product-item { width: 100%; text-align: center; cursor: pointer; }
            .img-box { width: 100%; aspect-ratio: 1 / 1; background: #f7f7f7; margin-bottom: 15px; overflow: hidden; }
            .img-box img { width: 100%; height: 100%; object-fit: cover; }
            .info-box .name { font-size: 14px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
            .info-box .desc { font-size: 12px; color: #666; line-height: 1.6; font-weight: 300; padding: 0 10px; }
        }

        /* [4. PC 레이아웃 - 원본 유지] */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                border-left: 1px solid #eee; transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px;
                box-shadow: none;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; font-weight: 300; }

            main { padding: 220px 80px 100px; display: flex; flex-direction: column; align-items: center; position: relative; }
            
            .page-title { font-size: 2.0rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 100px; text-align: center; cursor: pointer; transition: opacity 0.3s; }
            .page-title:hover { opacity: 0.5; }
            
            .container { max-width: 1400px; width: 100%; display: flex; gap: 80px; align-items: flex-start; }
            
            .sidebar { min-width: 220px; border-right: 1px solid #eee; display: flex; flex-direction: column; gap: 40px; text-align: left; }
            .side-title { font-size: 0.9rem; color: #888; letter-spacing: 0.1em; font-weight: 300; margin-bottom: 5px; } 
            .side-nav a { display: block; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; color: #000; transition: opacity 0.3s; }
            .side-nav a.active { text-decoration: underline; text-underline-offset: 8px; }
            .side-nav a:hover { opacity: 0.5; }

            .content-area { flex: 1; display: flex; flex-direction: column; }
            
            .breadcrumb { font-size: 0.9rem; color: #888; letter-spacing: 0.1em; margin-bottom: 10px; text-transform: capitalize; font-weight: 300; }
            .breadcrumb a:hover { color: #000; }
            .breadcrumb span { margin: 0 8px; }

            .sub-title { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; text-align: left; cursor: pointer; transition: opacity 0.3s; }
            .sub-title:hover { opacity: 0.5; }

            .pc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 20px; width: 100%; }
            .product-item { cursor: pointer; transition: opacity 0.3s; }
            .product-item:hover { opacity: 0.7; }
            .img-box { width: 100%; aspect-ratio: 1 / 1; background: #f7f7f7; margin-bottom: 15px; overflow: hidden; }
            .img-box img { width: 100%; height: 100%; object-fit: cover; }
            .info-box .name { font-size: 14px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
            .info-box .desc { font-size: 12px; color: #666; line-height: 1.5; }

            .mobile-only { display: none !important; }
        }

        footer { width: 100%; padding: 60px 20px; text-align: center; font-size: 10px; letter-spacing: 0.15em; color: #000; margin-top: auto; border-top: none; background-color: #fff; }
        img{ -webkit-user-drag: none; user-select: none; -webkit-touch-callout: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title" onclick="location.href='objects.html'">OBJECTS</h1>
        
        <h2 class="sub-title mobile-only" onclick="location.href='kettle.html'">KETTLE</h2>

        <div class="container">
            <aside class="sidebar pc-only">
                <div class="side-title">Select by Category</div>
                <nav class="side-nav">
                    <a href="kettle.html" class="active">Kettle</a>
                    <a href="vase.html">Vase</a>
                </nav>
            </aside>

            <section class="content-area">
                <div class="breadcrumb pc-only">
                    <a href="objects.html">Objects</a> <span>&gt;</span> Kettle
                </div>
                <h2 class="sub-title pc-only" onclick="location.href='kettle.html'">KETTLE</h2>

                <div class="pc-grid pc-only" id="pcProductList"></div>
                <div class="mobile-grid mobile-only" id="mobileProductList"></div>
            </section>
        </div>
    </main>

    <footer>© BONGEUM. All rights reserved.</footer>

    <script>
    const KETTLE_PRODUCTS = [
        { id: "01", name: "Kettle No.1", desc: "고운 흙의 질감을 살린 전통 다기입니다.", img: "images/objects/kettle/objects_images_kettle_1.jpeg" },
        { id: "02", name: "Kettle No.2", desc: "미니멀한 실루엣의 화이트 케틀입니다.", img: "images/objects/kettle/objects_images_kettle_2.jpeg" },
        { id: "03", name: "Kettle No.3", desc: "깊은 숲의 색감을 담은 유약 작품입니다.", img: "images/objects/kettle/objects_images_kettle_3.jpeg" },
        { id: "04", name: "Kettle No.4", desc: "거친 붓 터치가 살아있는 수제 작품입니다.", img: "images/objects/kettle/objects_images_kettle_1.jpeg" },
        { id: "05", name: "Kettle No.5", desc: "단단한 바위의 무게감을 담은 설계입니다.", img: "images/objects/kettle/objects_images_kettle_2.jpeg" }
    ];

    function renderProducts() {
        const pcList = document.getElementById('pcProductList');
        const mobileList = document.getElementById('mobileProductList');
        KETTLE_PRODUCTS.forEach(p => {
            const itemHtml = `
                <div class="product-item" onclick="location.href='product_detail.html?id=${p.id}'">
                    <div class="img-box"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="info-box">
                        <p class="name">${p.name}</p>
                        <p class="desc">${p.desc}</p>
                    </div>
                </div>
            `;
            pcList.innerHTML += itemHtml;
            mobileList.innerHTML += itemHtml;
        });
    }
    renderProducts();

    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');
        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        } else {
            spans[0].style.transform = 'none'; spans[1].style.opacity = '1'; spans[2].style.transform = 'none';
        }
    }
    document.addEventListener('mousedown', function(e) {
        const nav = document.getElementById('navOverlay');
        const menuBtn = document.getElementById('menuBtn');
        if (nav.classList.contains('active')) {
            if (!nav.contains(e.target) && !menuBtn.contains(e.target)) toggleMenu();
        }
    });
    </script>
</body>
</html>
