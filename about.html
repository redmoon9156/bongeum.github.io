<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT | Bongeum</title>
<style>
/* [1. кіөнҶө лҰ¬м…Ӣ л°Ҹ кё°ліё м„Өм •] ------------------------- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background-color: #ffffff;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #000;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    /* н‘ён„° н•ҳлӢЁ кі м •мқ„ мң„н•ң м„Өм • */
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
img { max-width: 100%; height: auto; display: block; border-radius: 0; }

/* [2. н—ӨлҚ” - н•ҳм–Җмғү л¶ҲнҲ¬лӘ… кі м •] ----------------------- */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
    background-color: rgba(255,255,255,0); /* нҲ¬лӘ…н•ҳкІҢ! */
    transition: background 0.3s;
}
.logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
.menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
.menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

/* [3. л„Өл№„кІҢмқҙм…ҳ мҳӨлІ„л Ҳмқҙ] ---------------------------- */
.nav-overlay {
    position: fixed;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #fff;
    z-index: 1500;
    transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 120px;
    box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
}
.nav-overlay.active { top: 0; }
.nav-list { text-align: center; }
.nav-list li { margin: 25px 0; }
.nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

@media (max-width: 1023px) {
    .nav-overlay {
        height: 50dvh;
        top: -50dvh;
        padding-top: 90px;
    }
    .nav-overlay.active { top: 0; }
}

@media (min-width: 1024px) {
    header { padding: 60px 80px; }
    .logo { font-size: 1.3rem; }
    .nav-overlay {
        top: 0; left: 100%; width: 450px; height: 100vh;
        transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        border-left: 1px solid #eee;
        justify-content: flex-start;
        align-items: flex-start;
        padding: 180px 0 0 80px;
        box-shadow: none;
    }
    .nav-overlay.active { left: calc(100% - 450px);}
    .nav-list { text-align: left; }
    .nav-list li { margin: 35px 0;}
    .nav-list li a { font-size: 1rem;}
}

/* [4. л©”мқё мҪҳн…җмё  л Ҳмқҙм•„мӣғ] --------------------------- */
main {
    padding: 140px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1; /* н‘ён„°лҘј н•ҳлӢЁмңјлЎң л°Җм–ҙлӮҙкё° мң„н•ҙ к°ҖліҖ мҳҒм—ӯ м„Өм • */
}
.page-title {
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 40px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}
.about-image { width: 100%; margin-bottom: 40px; }
.about-text { width: 100%; text-align: left; font-size: 1rem; line-height: 1.8; letter-spacing: 0.02em; }

@media (min-width: 1024px) {
    main { padding: 220px 10vw 100px; }
    .page-title { font-size: 2.0rem; margin-bottom: 60px;}
    .content-container { display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 100%; }
    .about-image { width: 45%; margin-bottom: 0; }
    .about-text { width: 45%; font-size: 1.2rem; }
}

/* [5. н•ҳлӢЁ кі м • н‘ён„°] --------------------------------- */
footer {
    width: 100%;
    padding: 30px 20px;
    text-align: center;
    background-color: #fff;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #000; /* [мҲҳм •] кІҖмқҖмғү кёҖмһҗ м Ғмҡ© */
    margin-top: auto; /* нҺҳмқҙм§Җ лҒқм—җ кі м • */
}
</style>
</head>
<body>
    <!-- м—¬кё°м„ң headerлҠ” fetchлЎң лҸҷм ҒмңјлЎң мӮҪмһ…лҗ©лӢҲлӢӨ -->
    <div id="header"></div>
    <main>
        <h1 class="page-title">ABOUT</h1>
        <div class="content-container">
            <div class="about-image">
                <img src="images/about/about_image_1.png" alt="about_image_1">
            </div>
            <div class="about-text">
                I am designer Bongeum.
            </div>
        </div>
    </main>
    <footer>
        В© BONGEUM. All rights reserved.
    </footer>
    <script>
    // н—ӨлҚ”лҘј л№„лҸҷкё°лЎң л¶Ҳлҹ¬мҳӨкі , header.jsлҘј л¶Ҳлҹ¬мҳөлӢҲлӢӨ.
    document.addEventListener("DOMContentLoaded", function(){
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
                var script = document.createElement('script');
                script.src = 'header.js';
                document.body.appendChild(script);
            });
    });
    </script>
</body>
</html>
