<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        a:hover { opacity: 0.5; }
        ul { list-style: none; }

        /* [2. 헤더 및 햄버거 버튼 - index 동일] ------------------ */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이 - index 동일] ----------------- */
        .nav-overlay {
            position: fixed;
            top: -100%; left: 0; width: 100%; height: 100vh;
            background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; justify-content: center; align-items: flex-start; padding-top: 120px;
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 모바일 레이아웃 (Gakion 구성 유지)] -------------- */
        main {
            padding: 150px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .contact-title {
            font-size: 1.8rem; /* [수정] 30~40% 축소된 크기 */
            font-weight: 300;
            margin-bottom: 60px;
            letter-spacing: -0.01em;
        }

        .contact-grid {
            display: flex;
            flex-direction: column; /* 모바일/PC 모두 세로 배치 */
            width: 100%;
        }

        .info-group {
            border-top: 1px solid #eee; /* Gakion 스타일의 얇은 구분선 */
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
        }

        .value {
            font-size: 0.95rem;
            font-weight: 400;
            text-align: right;
        }

        /* [5. PC 환경 독립 설계 (세로형 리스트 고수)] ----------- */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }

            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee;
                display: flex; justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }

            /* PC 레이아웃: 가로 나열 대신 세로 리스트 유지 */
            main {
                padding: 200px 15vw 100px;
                max-width: 1200px;
                margin: 0 auto;
            }

            .contact-title {
                font-size: 3.5rem; /* [수정] PC 타이틀 크기도 40% 가량 축소 */
                margin-bottom: 80px;
            }

            .contact-grid {
                max-width: 600px; /* PC에서도 너무 퍼지지 않게 폭 제한 */
            }

            .info-group {
                padding: 30px 0;
            }

            .value {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
            <li><a href="shop.html" onclick="toggleMenu()">Shop</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="contact-title">Contact</h1>

        <div class="contact-grid">
            <div class="info-group">
                <span class="label">Email</span>
                <a href="#" class="value">Address pending...</a>
            </div>

            <div class="info-group">
                <span class="label">Instagram</span>
                <a href="#" target="_blank" class="value">Link pending...</a>
            </div>

            <div class="info-group">
                <span class="label">Location</span>
                <span class="value">Seoul, KR</span>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>

</body>
</html>
