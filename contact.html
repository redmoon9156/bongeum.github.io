<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; display: inline-block; }
        ul { list-style: none; }

        /* [2. 헤더 - About.html 기준] */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px; /* 모바일 패딩 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            background-color: #ffffff;
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이 - About.html 기준] */
        .nav-overlay {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 120px;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* 모바일 네비게이션 높이 조정 */
        @media (max-width: 1023px) {
            .nav-overlay {
                height: 50dvh;
                top: -50dvh;
                padding-top: 90px;
            }
            .nav-overlay.active { top: 0; }
        }

        /* [PC 환경 - About.html 기준 적용] */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; } /* 헤더 패딩 일치 */
            .logo { font-size: 1.3rem; } /* 로고 크기 일치 */
            
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee;
                justify-content: flex-start;
                align-items: flex-start;
                padding: 180px 0 0 80px;
                box-shadow: none;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }
        }

        /* [4. 메인 콘텐츠 - 잘림 문제 수정] */
        main {
            padding: 140px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .page-title {
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .contact-info {
            width: 100%;
            text-align: center;
            font-size: 1rem;
            line-height: 2;
            letter-spacing: 0.05em;
        }

        @media (min-width: 1024px) {
            /* 상단 padding을 220px로 늘려 타이틀이 잘리지 않게 조정 */
            main { padding: 220px 10vw 100px; } 
            .page-title { font-size: 2.0rem; margin-bottom: 60px; } /* 타이틀 크기 일치 */
            .contact-info { font-size: 1.2rem; }
        }

        /* [5. 하단 고정 푸터] */
        footer {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            background-color: #fff;
            font-size: 10px;
            letter-spacing: 0.15em;
            color: #000; 
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title">CONTACT</h1>
        <div class="contact-info">
            <p>E-MAIL: bongeum@bongeum.com</p>
            <p>INSTAGRAM: @bongeum</p>
        </div>
    </main>

    <footer>
        © BONGEUM. All rights reserved.
    </footer>

    <script>
    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');

        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        }
        else {
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
        }
    }

    // 메뉴 영역 밖 클릭 시 닫기 기능 추가
    document.addEventListener('mousedown', function(e) {
        const nav = document.getElementById('navOverlay');
        const menuBtn = document.getElementById('menuBtn');
        
        if (nav.classList.contains('active')) {
            if (!nav.contains(e.target) && !menuBtn.contains(e.target)) {
                toggleMenu();
            }
        }
    });
    </script>
</body>
</html>
