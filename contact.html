<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        a:hover { opacity: 0.5; }
        ul { list-style: none; }

        /* [2. 헤더 및 햄버거 버튼] ----------------------------- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

        .menu-trigger {
            cursor: pointer;
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .menu-trigger span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: #000;
            transition: 0.3s;
        }

        /* [3. 모바일 메뉴 (Top to Bottom & 상단 배치)] ---------- */
        .nav-overlay {
            position: fixed;
            top: -100%; 
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 120px;
        }
        .nav-overlay.active { top: 0; }

        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 메인 컨텐츠 영역 - Gakion 스타일 반영] ----------- */
        main {
            min-height: 100vh;
            padding: 150px 20px 60px; /* 헤더 여백 확보 */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .contact-title {
            font-size: 3rem; /* 모바일에서의 압도적 타이틀 */
            font-weight: 300;
            margin-bottom: 80px;
            letter-spacing: -0.02em;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .info-group {
            border-top: 1px solid #000; /* Gakion의 구조적 선 활용 */
            padding-top: 15px;
        }

        .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            color: #999;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 400;
            display: block;
        }

        /* [5. PC 환경 독립 설계 (Right to Left & 상단 배치)] ---- */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }

            .nav-overlay {
                top: 0;
                left: 100%; 
                width: 450px; 
                height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee;
                
                display: flex;
                justify-content: flex-start;
                align-items: flex-start;
                padding: 180px 0 0 80px;
            }
            .nav-overlay.active { left: calc(100% - 450px); }

            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }

            /* PC 전용 레이아웃 조정 */
            main {
                padding: 250px 10vw 100px;
            }

            .contact-title {
                font-size: 6rem; /* PC에서의 대담한 폰트 크기 */
                margin-bottom: 120px;
            }

            .contact-grid {
                grid-template-columns: repeat(3, 1fr); /* 3열 배치 */
                gap: 5vw;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
            <li><a href="shop.html" onclick="toggleMenu()">Shop</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="contact-title">Contact</h1>

        <div class="contact-grid">
            <div class="info-group">
                <span class="label">Email</span>
                <a href="#" class="value">Address pending...</a>
            </div>

            <div class="info-group">
                <span class="label">Instagram</span>
                <a href="#" target="_blank" class="value">Link pending...</a>
            </div>

            <div class="info-group">
                <span class="label">Location</span>
                <span class="value">Seoul, KR</span>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>

</body>
</html>
