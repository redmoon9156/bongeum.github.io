<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | Bongeum</title>
    <style>
        /* [1. 공통 리셋] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; display: inline-block; }
        ul { list-style: none; }

        /* [2. 헤더 - About.html 기준 완벽 동기화] */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; background-color: #ffffff; 
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이] */
        .nav-overlay {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100vh;
            background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; justify-content: center; align-items: flex-start; padding-top: 120px;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        @media (max-width: 1023px) {
            .nav-overlay { height: 50dvh; top: -50dvh; padding-top: 90px; }
            .nav-overlay.active { top: 0; }
        }

        @media (min-width: 1024px) {
            header { padding: 60px 80px; } 
            .logo { font-size: 1.3rem; } 
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee; justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px;
                box-shadow: none;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }
        }

        /* [4. 메인 콘텐츠] */
        main {
            padding: 140px 20px 60px;
            display: flex; flex-direction: column; align-items: center; flex: 1;
        }
        .page-title {
            width: 100%; text-align: center; font-size: 1.2rem; font-weight: 700;
            margin-bottom: 40px; letter-spacing: 0.1em; text-transform: uppercase;
        }
        
        .contact-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 40px; align-items: center; }
        .contact-item { display: flex; align-items: center; gap: 18px; }
        
        /* CSS 아이콘 베이스 */
        .icon-box {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 이메일 아이콘 (CSS로 그림) */
        .mail-icon {
            width: 20px; height: 14px;
            border: 1.5px solid #000;
            position: relative;
        }
        .mail-icon::after {
            content: ''; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, transparent 48%, #000 48%, #000 52%, transparent 52%),
                        linear-gradient(225deg, transparent 48%, #000 48%, #000 52%, transparent 52%);
            background-size: 100% 60%;
            background-repeat: no-repeat;
        }

        /* 인스타그램 아이콘 (CSS로 그림) */
        .insta-icon {
            width: 20px; height: 20px;
            border: 1.5px solid #000;
            border-radius: 5px;
            position: relative;
        }
        .insta-icon::before {
            content: ''; position: absolute;
            width: 8px; height: 8px;
            border: 1.5px solid #000; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .insta-icon::after {
            content: ''; position: absolute;
            width: 2px; height: 2px;
            background-color: #000; border-radius: 50%;
            top: 3px; right: 3px;
        }

        .contact-text { font-size: 1rem; letter-spacing: 0.02em; font-weight: 400; }

        @media (min-width: 1024px) {
            main { padding: 220px 10vw 100px; } 
            .page-title { font-size: 2.0rem; margin-bottom: 60px; }
            .contact-text { font-size: 1.1rem; }
        }

        /* [5. 푸터] */
        footer {
            width: 100%; padding: 30px 20px; text-align: center;
            background-color: #fff; font-size: 10px; letter-spacing: 0.15em; color: #000; margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title">CONTACT</h1>
        <div class="contact-container">
            <div class="contact-item">
                <div class="icon-box"><div class="mail-icon"></div></div>
                <span class="contact-text">bongeum@bongeum.com</span>
            </div>
            <a href="https://www.instagram.com/bongeum" target="_blank" class="contact-item">
                <div class="icon-box"><div class="insta-icon"></div></div>
                <span class="contact-text">@bongeum</span>
            </a>
        </div>
    </main>

    <footer>© BONGEUM. All rights reserved.</footer>

    <script>
    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');
        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        } else {
            spans[0].style.transform = 'none'; spans[1].style.opacity = '1'; spans[2].style.transform = 'none';
        }
    }
    document.addEventListener('mousedown', function(e) {
        const nav = document.getElementById('navOverlay');
        const menuBtn = document.getElementById('menuBtn');
        if (nav.classList.contains('active')) {
            if (!nav.contains(e.target) && !menuBtn.contains(e.target)) { toggleMenu(); }
        }
    });
    </script>
</body>
</html>
