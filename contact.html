<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | Bongeum</title>
    <style>
        /* [1. 공통 리셋] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; display: inline-block; }
        ul { list-style: none; }

        /* [2. 헤더 - About.html 기준] */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 2000; background-color: #ffffff; 
        }
        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .menu-trigger { cursor: pointer; width: 24px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; z-index: 2001; }
        .menu-trigger span { display: block; width: 100%; height: 1px; background-color: #000; transition: 0.3s; }

        /* [3. 네비게이션 오버레이 - About.html 기준] */
        .nav-overlay {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100vh;
            background-color: #fff; z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; justify-content: center; align-items: flex-start; padding-top: 120px;
            box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
        }
        .nav-overlay.active { top: 0; }
        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        @media (max-width: 1023px) {
            .nav-overlay { height: 58dvh; top: -58dvh; padding-top: 100px; }
            .nav-overlay.active { top: 0; }
        }

        /* PC 환경 헤더/메뉴 동기화 */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; } 
            .logo { font-size: 1.3rem; } 
            .nav-overlay {
                top: 0; left: 100%; width: 450px; height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee; justify-content: flex-start; align-items: flex-start; padding: 180px 0 0 80px;
                box-shadow: none;
            }
            .nav-overlay.active { left: calc(100% - 450px); }
            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }
        }

        /* [4. 메인 콘텐츠 및 콘택트 레이아웃] */
        main {
            padding: 140px 20px 60px;
            display: flex; flex-direction: column; align-items: center; flex: 1;
        }
        .page-title {
            width: 100%; text-align: center; font-size: 1.2rem; font-weight: 700;
            margin-bottom: 40px; letter-spacing: 0.1em; text-transform: uppercase;
        }

        .contact-area { width: 100%; max-width: 600px; }
        .contact-stack { display: flex; flex-direction: column; align-items: center; gap: 35px; }
        .contact-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }

        .contact-icon { color: #000; line-height: 0; transition: opacity 0.3s; }
        .contact-link { font-size: 15px; letter-spacing: 0.02em; color: #000; transition: opacity 0.3s; }
        .contact-icon:hover, .contact-link:hover { opacity: 0.5; }

        @media (min-width: 1024px) {
            main { padding: 220px 80px 100px; align-items: flex-start; } 
            .page-title { font-size: 2.0rem; text-align: left; margin-bottom: 60px; }
            .contact-stack { align-items: flex-start; }
            .contact-item { align-items: flex-start; }
        }

        /* [5. 푸터] */
        footer {
            width: 100%; padding: 30px 20px; text-align: center;
            background-color: #fff; font-size: 10px; letter-spacing: 0.15em; color: #000; margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title">CONTACT</h1>
        <section class="contact-area">
            <div class="contact-stack">

                <div class="contact-item">
                    <a href="mailto:bongeum@bongeum.com" class="contact-icon" aria-label="Send Email">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4.5 7.5h15c.55 0 1 .45 1 1v8c0 .55-.45 1-1 1h-15c-.55 0-1-.45-1-1v-8c0-.55.45-1 1-1Z" stroke="currentColor" stroke-width="1.2"/>
                            <path d="M5.5 8.5 12 13.2 18.5 8.5" stroke="currentColor" stroke-width="1.2"/>
                        </svg>
                    </a>
                    <a class="contact-link" href="mailto:bongeum@bongeum.com">bongeum@bongeum.com</a>
                </div>

                <div class="contact-item">
                    <a href="https://www.instagram.com/bongeum" target="_blank" class="contact-icon" rel="noopener" aria-label="Visit Instagram">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 3.75h8A4.25 4.25 0 0 1 20.25 8v8A4.25 4.25 0 0 1 16 20.25H8A4.25 4.25 0 0 1 3.75 16V8A4.25 4.25 0 0 1 8 3.75Z" stroke="currentColor" stroke-width="1.2"/>
                            <path d="M12 15.6a3.6 3.6 0 1 0 0-7.2 3.6 3.6 0 0 0 0 7.2Z" stroke="currentColor" stroke-width="1.2"/>
                            <path d="M16.9 7.25h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </a>
                    <a class="contact-link" href="https://www.instagram.com/bongeum" target="_blank" rel="noopener">Instagram</a>
                </div>

            </div>
        </section>
    </main>

    <footer>© BONGEUM. All rights reserved.</footer>

    <script>
    function toggleMenu() {
        const nav = document.getElementById('navOverlay');
        const spans = document.querySelectorAll('.menu-trigger span');
        nav.classList.toggle('active');
        if(nav.classList.contains('active')) {
            spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
        } else {
            spans[0].style.transform = 'none'; spans[1].style.opacity = '1'; spans[2].style.transform = 'none';
        }
    }
    document.addEventListener('mousedown', function(e) {
        const nav = document.getElementById('navOverlay');
        const menuBtn = document.getElementById('menuBtn');
        if (nav.classList.contains('active')) {
            if (!nav.contains(e.target) && !menuBtn.contains(e.target)) { toggleMenu(); }
        }
    });
    </script>
</body>
</html>
