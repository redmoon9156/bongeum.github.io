<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bongeum</title>
    <style>
        /* [1. 공통 리셋 및 기본 설정] ------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* [2. 헤더 및 햄버거 버튼 - index.html과 동일] ----------- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

        .menu-trigger {
            cursor: pointer;
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .menu-trigger span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: #000;
            transition: 0.3s;
        }

        /* [3. 네비게이션 오버레이 - index.html과 동일] ---------- */
        .nav-overlay {
            position: fixed;
            top: -100%; 
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            z-index: 1500;
            transition: top 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 120px;
        }
        .nav-overlay.active { top: 0; }

        .nav-list { text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list li a { font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300; }

        /* [4. 메인 컨텐츠 영역 - Gakion 레이아웃 적용] ---------- */
        main {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Gakion 스타일의 중앙 정렬 */
            padding: 0 20px;
        }

        .contact-wrap {
            text-align: center;
            width: 100%;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700; /* Gakion의 볼드함 유지 */
            margin-bottom: 40px;
            letter-spacing: -0.01em;
        }

        .contact-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .contact-icon {
            color: rgba(0,0,0,.72);
        }

        .contact-link {
            font-size: 14px;
            letter-spacing: .15px;
            color: rgba(0,0,0,.72);
        }
        .contact-link:hover { color: #000; }

        /* [5. PC 환경 독립 설계 - index.html @media 기준] ------- */
        @media (min-width: 1024px) {
            header { padding: 60px 80px; }
            .logo { font-size: 1.3rem; }

            /* PC용 메뉴 슬라이드 (index.html 설정 유지) */
            .nav-overlay {
                top: 0;
                left: 100%; 
                width: 450px; 
                height: 100vh;
                transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid #eee;
                
                justify-content: flex-start;
                align-items: flex-start;
                padding: 180px 0 0 80px;
            }
            .nav-overlay.active { left: calc(100% - 450px); }

            .nav-list { text-align: left; }
            .nav-list li { margin: 35px 0; }
            .nav-list li a { font-size: 1rem; }

            /* PC 레이아웃 확장 */
            .page-title {
                font-size: 28px; /* Gakion PC 타이틀 크기 */
                margin-bottom: 50px;
            }
            .contact-stack { gap: 30px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Bongeum</a></div>
        <div class="menu-trigger" id="menuBtn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-list">
            <li><a href="about.html" onclick="toggleMenu()">About</a></li>
            <li><a href="objects.html" onclick="toggleMenu()">Objects</a></li>
            <li><a href="contact.html" onclick="toggleMenu()">Contact</a></li>
            <li><a href="shop.html" onclick="toggleMenu()">Shop</a></li>
        </ul>
    </nav>

    <main>
        <div class="contact-wrap">
            <h1 class="page-title">Contact</h1>

            <section class="contact-stack">
                <div class="contact-item">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4.5 7.5h15c.55 0 1 .45 1 1v8c0 .55-.45 1-1 1h-15c-.55 0-1-.45-1-1v-8c0-.55.45-1-1-1Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M5.5 8.5 12 13.2 18.5 8.5" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <a class="contact-link" href="mailto:#">info@bongeum.com</a>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 3.75h8A4.25 4.25 0 0 1 20.25 8v8A4.25 4.25 0 0 1 16 20.25H8A4.25 4.25 0 0 1 3.75 16V8A4.25 4.25 0 0 1 8 3.75Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 15.6a3.6 3.6 0 1 0 0-7.2 3.6 3.6 0 0 0 0 7.2Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M16.9 7.25h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <a class="contact-link" href="#" target="_blank">Instagram</a>
                </div>
            </section>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            const spans = document.querySelectorAll('.menu-trigger span');
            nav.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                spans[0].style.transform = 'translateY(8.5px) rotate(45deg)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'translateY(-8.5px) rotate(-45deg)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>

</body>
</html>
